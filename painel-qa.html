<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --bg:#EFF3F8;--card:#FFFFFF;--border:#E2E8F0;
  --navy:#0C2340;--navy-mid:#163556;--navy-light:#1E4473;
  --accent:#0369A1;--success:#047857;--danger:#B91C1C;--purple:#6D28D9;
  --text-primary:#0F172A;--text-muted:#64748B;
  --radius:14px;--shadow-sm:0 1px 4px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-primary); }
.header { background:linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%); padding:15px 30px; color:white; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.header h1 { font-family:'Syne',sans-serif; font-size:18px; }
.main { padding:20px; max-width:1600px; margin:0 auto; }
.kpi-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:15px; margin-bottom:20px; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); border-top:4px solid var(--accent); }
.kpi-lbl { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:5px; }
.kpi-val { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; }
.row { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; min-height:350px; }
.ch-title { font-size:14px; font-weight:700; margin-bottom:15px; color:var(--navy); }
.loader { position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
</style>
</head>
<body>

<div id="loading" class="loader">
    <div style="font-weight:bold; margin-bottom:10px;">📊 Carregando Dados da Qualidade...</div>
    <div style="font-size:12px; color:gray;">Garantindo precisão nas contagens</div>
</div>

<header class="header">
    <h1>QA Dashboard Executivo</h1>
    <div id="updateTime" style="font-size:12px; opacity:0.8;"></div>
</header>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-lbl">Total Re-Auditado</div>
            <div class="kpi-val" id="kTotal">0</div>
        </div>
        <div class="kpi-card" style="border-top-color:var(--success)">
            <div class="kpi-lbl">QTD de Acertos</div>
            <div class="kpi-val" id="kSim" style="color:var(--success)">0</div>
        </div>
        <div class="kpi-card" style="border-top-color:var(--danger)">
            <div class="kpi-lbl">Inconsistências</div>
            <div class="kpi-val" id="kNao" style="color:var(--danger)">0</div>
        </div>
        <div class="kpi-card" style="border-top-color:var(--purple)">
            <div class="kpi-lbl">% Qualidade</div>
            <div class="kpi-val" id="kPct">0%</div>
        </div>
    </div>

    <div class="row">
        <div class="chart-card">
            <div class="ch-title">Qualidade por Projeto (%)</div>
            <canvas id="chartProj"></canvas>
        </div>
        <div class="chart-card">
            <div class="ch-title">Volume por Auditor (Contagem)</div>
            <canvas id="chartAuditor"></canvas>
        </div>
    </div>

    <div class="row">
        <div class="chart-card" style="grid-column: span 2;">
            <div class="ch-title">Pareto: Motivos de Inconsistência</div>
            <canvas id="chartPareto"></canvas>
        </div>
    </div>
</div>

<script>
const CSV_URLS = [
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRy08WRcxagknb0ucDbTkvUyUW7hjqR2uAyHtaSqyZpIJIq8ejzTL-1F2ZC0M4spg8XUQIxBqNz38s_/pub?gid=352996843&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRy08WRcxagknb0ucDbTkvUyUW7hjqR2uAyHtaSqyZpIJIq8ejzTL-1F2ZC0M4spg8XUQIxBqNz38s_/pub?gid=1439413758&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRy08WRcxagknb0ucDbTkvUyUW7hjqR2uAyHtaSqyZpIJIq8ejzTL-1F2ZC0M4spg8XUQIxBqNz38s_/pub?gid=1819995490&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRy08WRcxagknb0ucDbTkvUyUW7hjqR2uAyHtaSqyZpIJIq8ejzTL-1F2ZC0M4spg8XUQIxBqNz38s_/pub?gid=2022041798&single=true&output=csv'
];

let rawData = [];
let charts = {};

// Configuração dos Rótulos de Dados
const dlConfig = (maxVal) => ({
    anchor: ctx => ctx.parsed.y > (maxVal * 0.15) ? 'center' : 'end',
    align: ctx => ctx.parsed.y > (maxVal * 0.15) ? 'center' : 'top',
    color: ctx => ctx.parsed.y > (maxVal * 0.15) ? '#FFFFFF' : '#0F172A',
    font: { weight: 'bold', size: 12 },
    formatter: val => Math.round(val)
});

async function init() {
    try {
        for (const url of CSV_URLS) {
            const resp = await fetch(url + '&cache=' + Date.now(), { mode: 'cors' });
            const text = await resp.text();
            const json = Papa.parse(text, { header: true, skipEmptyLines: true }).data;
            
            // FILTRO DE OURO: Só considera se a coluna "Auditoria está correta?" (Index 5) for Sim ou Não
            const valid = json.filter(row => {
                const status = String(Object.values(row)[5] || "").toLowerCase().trim();
                return status === 'sim' || status === 'não' || status === 'nao';
            });
            rawData = rawData.concat(valid);
        }
        
        updateDashboard();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('updateTime').innerText = "Última atualização: " + new Date().toLocaleTimeString();
    } catch (e) {
        document.getElementById('loading').innerText = "Erro ao carregar Planilhas. Verifique a Publicação.";
    }
}

function updateDashboard() {
    const total = rawData.length;
    const sim = rawData.filter(r => String(Object.values(r)[5]).toLowerCase().includes('sim')).length;
    const nao = total - sim;
    const pct = total > 0 ? ((sim / total) * 100).toFixed(1) : 0;

    document.getElementById('kTotal').innerText = total;
    document.getElementById('kSim').innerText = sim;
    document.getElementById('kNao').innerText = nao;
    document.getElementById('kPct').innerText = pct + "%";

    renderProjectChart();
    renderAuditorChart();
    renderParetoChart();
}

function renderProjectChart() {
    const ctx = document.getElementById('chartProj');
    const projs = [...new Set(rawData.map(r => r.Projeto))];
    const values = projs.map(p => {
        const sub = rawData.filter(r => r.Projeto === p);
        const s = sub.filter(r => String(Object.values(r)[5]).toLowerCase().includes('sim')).length;
        return ((s / sub.length) * 100).toFixed(1);
    });

    if(charts.proj) charts.proj.destroy();
    charts.proj = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: projs,
            datasets: [{ label: '% Qualidade', data: values, backgroundColor: '#0369A1' }]
        },
        plugins: [ChartDataLabels],
        options: { 
            maintainAspectRatio: false,
            plugins: { datalabels: dlConfig(100), legend: { display: false } },
            scales: { y: { beginAtZero: true, max: 100 } }
        }
    });
}

function renderAuditorChart() {
    const ctx = document.getElementById('chartAuditor');
    const auditors = [...new Set(rawData.map(r => r.Auditor))];
    const values = auditors.map(a => rawData.filter(r => r.Auditor === a).length);
    const max = Math.max(...values);

    if(charts.aud) charts.aud.destroy();
    charts.aud = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: auditors,
            datasets: [{ label: 'Volume', data: values, backgroundColor: '#1E293B' }]
        },
        plugins: [ChartDataLabels],
        options: { 
            maintainAspectRatio: false,
            plugins: { datalabels: dlConfig(max), legend: { display: false } }
        }
    });
}

function renderParetoChart() {
    const ctx = document.getElementById('chartPareto');
    const motivos = {};
    rawData.filter(r => !String(Object.values(r)[5]).toLowerCase().includes('sim')).forEach(r => {
        const m = r.Observação || "Não Especificado";
        motivos[m] = (motivos[m] || 0) + 1;
    });

    const sorted = Object.entries(motivos).sort((a,b) => b[1] - a[1]).slice(0, 10);
    const max = sorted.length > 0 ? sorted[0][1] : 0;

    if(charts.pareto) charts.pareto.destroy();
    charts.pareto = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sorted.map(s => s[0]),
            datasets: [{ label: 'Qtd Inconsistências', data: sorted.map(s => s[1]), backgroundColor: '#B91C1C' }]
        },
        plugins: [ChartDataLabels],
        options: { 
            indexAxis: 'y',
            maintainAspectRatio: false,
            plugins: { datalabels: dlConfig(max), legend: { display: false } }
        }
    });
}

init();
</script>
</body>
</html>
